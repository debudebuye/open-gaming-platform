version: '3.9'

services:
  # ── API Gateway ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - '80:80'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-api
      - wallet-api
      - gaming-api
      - trading-api
      - admin-api
    restart: unless-stopped

  # ── Application Services ─────────────────────────────────────────────────────
  identity-api:
    build:
      context: ../../
      dockerfile: apps/identity-api/Dockerfile
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ogp
      DB_USER: ogp_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: identity
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 7d
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3

  wallet-api:
    build:
      context: ../../
      dockerfile: apps/wallet-api/Dockerfile
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ogp
      DB_USER: ogp_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: wallet
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 30s
      timeout: 5s
      retries: 3

  gaming-api:
    build:
      context: ../../
      dockerfile: apps/gaming-api/Dockerfile
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ogp
      DB_USER: ogp_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: gaming
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WALLET_API_URL: http://wallet-api:3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/health']
      interval: 30s
      timeout: 5s
      retries: 3

  trading-api:
    build:
      context: ../../
      dockerfile: apps/trading-api/Dockerfile
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ogp
      DB_USER: ogp_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: trading
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WALLET_API_URL: http://wallet-api:3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin-api:
    build:
      context: ../../
      dockerfile: apps/admin-api/Dockerfile
    environment:
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ogp
      DB_USER: ogp_user
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Data Layer ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ogp
      POSTGRES_USER: ogp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ogp_user -d ogp']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
