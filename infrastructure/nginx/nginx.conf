events {
  worker_connections 1024;
}

http {
  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  add_header Referrer-Policy "strict-origin-when-cross-origin";

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":"$status",'
    '"bytes_sent":"$bytes_sent",'
    '"request_time":"$request_time",'
    '"upstream_addr":"$upstream_addr"}';

  access_log /var/log/nginx/access.log json_combined;

  # ── Upstreams ──────────────────────────────────────────────────────────────
  upstream identity_api  { server identity-api:3001; }
  upstream wallet_api    { server wallet-api:3002; }
  upstream gaming_api    { server gaming-api:3003; }
  upstream trading_api   { server trading-api:3004; }
  upstream admin_api     { server admin-api:3005; }

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
  limit_req_zone $binary_remote_addr zone=wallet:10m  rate=30r/m;

  server {
    listen 80;
    server_name _;

    # Block internal service-to-service routes from public access
    location ~ ^/internal/ {
      deny all;
      return 403;
    }

    # ── Auth routes ──────────────────────────────────────────────────────────
    location /v1/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://identity_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/users/ {
      limit_req zone=global burst=20;
      proxy_pass http://identity_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Wallet routes ────────────────────────────────────────────────────────
    location /v1/wallet/ {
      limit_req zone=wallet burst=10 nodelay;
      proxy_pass http://wallet_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Gaming routes (betting, keno, casino) ────────────────────────────────
    location /v1/gaming/ {
      limit_req zone=global burst=50;
      proxy_pass http://gaming_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Trading routes ────────────────────────────────────────────────────────
    location /v1/trading/ {
      limit_req zone=global burst=100;
      proxy_pass http://trading_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Admin routes (restrict to internal network in production) ────────────
    location /v1/admin/ {
      # allow 10.0.0.0/8;   # Uncomment and configure for production
      # deny all;
      limit_req zone=global burst=10;
      proxy_pass http://admin_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health checks ─────────────────────────────────────────────────────────
    location /health/identity { proxy_pass http://identity_api/health; }
    location /health/wallet   { proxy_pass http://wallet_api/health; }
    location /health/gaming   { proxy_pass http://gaming_api/health; }
    location /health/trading  { proxy_pass http://trading_api/health; }
    location /health/admin    { proxy_pass http://admin_api/health; }
  }
}
